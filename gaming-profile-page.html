<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gaming Profile</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #2d3436 0%, #4a5759 100%);
            color: #fff;
            min-height: 100vh;
            padding: 40px 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: 400px 1fr;
            gap: 30px;
        }

        .profile-card {
            background: rgba(0, 0, 0, 0.4);
            border-radius: 20px;
            padding: 40px;
            height: fit-content;
            backdrop-filter: blur(10px);
        }

        .profile-image {
            width: 180px;
            height: 180px;
            border-radius: 50%;
            margin: 0 auto 20px;
            display: block;
            border: 4px solid #fff;
        }

        .username {
            font-size: 42px;
            font-weight: bold;
            text-align: center;
            margin-bottom: 10px;
            letter-spacing: 2px;
        }

        .location {
            text-align: center;
            color: #bbb;
            margin-bottom: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .social-links {
            display: flex;
            justify-content: center;
            gap: 15px;
            flex-wrap: wrap;
        }

        .social-link {
            width: 45px;
            height: 45px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            color: #fff;
            transition: all 0.3s;
        }

        .social-link:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: translateY(-3px);
        }

        .content-section {
            background: rgba(0, 0, 0, 0.4);
            border-radius: 20px;
            padding: 40px;
            backdrop-filter: blur(10px);
        }

        .section-header {
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 30px;
            display: flex;
            align-items: center;
            gap: 10px;
            letter-spacing: 1px;
        }

        .gear-grid, .specs-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }

        .gear-item, .spec-item {
            background: rgba(0, 0, 0, 0.3);
            padding: 20px;
            border-radius: 15px;
            transition: all 0.3s;
        }

        .gear-item:hover, .spec-item:hover {
            background: rgba(0, 0, 0, 0.5);
            transform: translateY(-5px);
        }

        .gear-image, .spec-image {
            width: 100%;
            height: 150px;
            object-fit: contain;
            margin-bottom: 15px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 10px;
            padding: 10px;
        }

        .gear-category, .spec-category {
            color: #ffd700;
            font-size: 12px;
            font-weight: bold;
            margin-bottom: 8px;
            text-transform: uppercase;
        }

        .gear-name, .spec-name {
            font-size: 16px;
            font-weight: bold;
        }

        .ranks-section {
            margin-bottom: 40px;
        }

        .ranks-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 20px;
        }

        .rank-card {
            background: rgba(0, 0, 0, 0.3);
            padding: 25px;
            border-radius: 15px;
            text-align: center;
            transition: all 0.3s;
        }

        .rank-card:hover {
            background: rgba(0, 0, 0, 0.5);
            transform: translateY(-5px);
        }

        .rank-game {
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 15px;
        }

        .rank-value {
            font-size: 32px;
            font-weight: bold;
            color: #ffd700;
            margin-bottom: 8px;
        }

        .rank-label {
            color: #bbb;
            font-size: 14px;
        }

        .games-section {
            margin-top: 40px;
        }

        .game-tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }

        .game-tab {
            padding: 12px 24px;
            background: rgba(255, 255, 255, 0.1);
            border: none;
            border-radius: 10px;
            color: #fff;
            cursor: pointer;
            font-size: 16px;
            transition: all 0.3s;
        }

        .game-tab:hover {
            background: rgba(255, 255, 255, 0.15);
        }

        .game-tab.active {
            background: #ffd700;
            color: #000;
        }

        .game-settings {
            display: none;
        }

        .game-settings.active {
            display: block;
        }

        .settings-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 15px;
        }

        .setting-item {
            background: rgba(0, 0, 0, 0.3);
            padding: 15px 20px;
            border-radius: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .setting-label {
            color: #bbb;
            font-size: 14px;
        }

        .setting-value {
            font-weight: bold;
            color: #ffd700;
        }

        @media (max-width: 1024px) {
            .container {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>

        // Initialize page
        function init() {
            // Profile
            document.getElementById('username').textContent = CONFIG.profile.username;
            document.getElementById('location').textContent = CONFIG.profile.location;
            document.getElementById('profileImage').src = CONFIG.profile.image;

            // Social links
            const socialLinks = document.getElementById('socialLinks');
            CONFIG.socials.forEach(social => {
                const link = document.createElement('a');
                link.href = social.url;
                link.className = 'social-link';
                link.textContent = social.icon;
                link.target = '_blank';
                socialLinks.appendChild(link);
            });

            // Gear
            const gearGrid = document.getElementById('gearGrid');
            CONFIG.gear.forEach(item => {
                const div = document.createElement('div');
                div.className = 'gear-item';
                div.innerHTML = `
                    <img src="${item.image}" alt="${item.name}" class="gear-image">
                    <div class="gear-category">${item.category}</div>
                    <div class="gear-name">${item.name}</div>
                `;
                gearGrid.appendChild(div);
            });

            // Specs
            const specsGrid = document.getElementById('specsGrid');
            CONFIG.specs.forEach(item => {
                const div = document.createElement('div');
                div.className = 'spec-item';
                div.innerHTML = `
                    <img src="${item.image}" alt="${item.name}" class="spec-image">
                    <div class="spec-category">${item.category}</div>
                    <div class="spec-name">${item.name}</div>
                `;
                specsGrid.appendChild(div);
            });

            // Ranks
            const ranksGrid = document.getElementById('ranksGrid');
            CONFIG.ranks.forEach(rank => {
                const div = document.createElement('div');
                div.className = 'rank-card';
                div.innerHTML = `
                    <div class="rank-game">${rank.game}</div>
                    <div class="rank-value">${rank.rank}</div>
                    <div class="rank-label">${rank.label}</div>
                `;
                ranksGrid.appendChild(div);
            });

            // Game settings
            const gameTabs = document.getElementById('gameTabs');
            const gameSettingsContainer = document.getElementById('gameSettingsContainer');

            CONFIG.games.forEach((game, index) => {
                // Create tab
                const tab = document.createElement('button');
                tab.className = 'game-tab' + (index === 0 ? ' active' : '');
                tab.textContent = game.name;
                tab.onclick = () => switchGame(index);
                gameTabs.appendChild(tab);

                // Create settings panel
                const panel = document.createElement('div');
                panel.className = 'game-settings' + (index === 0 ? ' active' : '');
                panel.id = `game-${index}`;

                const settingsGrid = document.createElement('div');
                settingsGrid.className = 'settings-grid';

                game.settings.forEach(setting => {
                    const item = document.createElement('div');
                    item.className = 'setting-item';
                    item.innerHTML = `
                        <span class="setting-label">${setting.label}</span>
                        <span class="setting-value">${setting.value}</span>
                    `;
                    settingsGrid.appendChild(item);
                });

                panel.appendChild(settingsGrid);
                gameSettingsContainer.appendChild(panel);
            });
        }

        function switchGame(index) {
            // Update tabs
            document.querySelectorAll('.game-tab').forEach((tab, i) => {
                tab.classList.toggle('active', i === index);
            });

            // Update panels
            document.querySelectorAll('.game-settings').forEach((panel, i) => {
                panel.classList.toggle('active', i === index);
            });
        }

        init();
    </script>
