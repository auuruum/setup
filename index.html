<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gaming Profile</title>
    <!-- Font Awesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <!-- External CSS -->
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <div class="profile-card">
            <img id="profileImage" class="profile-image" src="https://via.placeholder.com/180" alt="Profile">
            <h1 id="username" class="username">AUURUUM</h1>
            <div class="location">
                <span>🇱🇹</span>
                <span id="location">Lithuania</span>
            </div>
            <div class="social-links" id="socialLinks"></div>
        </div>

        <div class="content-section">
            <div class="section-header">🎮 GAMING SETUP</div>
            <div class="gear-grid" id="gearGrid"></div>

            <div class="section-header">💻 PC SPECS</div>
            <div class="specs-grid" id="specsGrid"></div>

            <div class="ranks-section">
                <div class="section-header">🏆 RANKS</div>
                <div class="ranks-grid" id="ranksGrid"></div>
            </div>

            <div class="games-section">
                <div class="section-header">⚙️ GAME SETTINGS</div>
                <div class="game-tabs" id="gameTabs"></div>
                <div id="gameSettingsContainer"></div>
            </div>
        </div>
    </div>

    <!-- External JavaScript -->
    <script src="script.js"></script>
</body>
</html>
